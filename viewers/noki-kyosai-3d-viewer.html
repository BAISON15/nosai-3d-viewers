<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; }
  #app { display: flex; flex-direction: column; height: 100vh; background: #f1f5f9; }
  header { background: #0f172a; color: #e2e8f0; padding: 10px 16px; border-bottom: 1px solid #1e293b; }
  header h1 { font-size: 13px; margin: 0; font-weight: 600; }
  header p { font-size: 10.5px; margin: 2px 0 0; color: #94a3b8; }
  main { flex: 1; display: flex; min-height: 0; flex-direction: row; }
  @media (max-width: 860px) { main { flex-direction: column; } }
  #viewport { position: relative; flex: 1; min-height: 360px; }
  #canvas-holder { position: absolute; inset: 0; }
  #canvas-holder canvas { display: block; touch-action: none; }
  .label { position: absolute; left: 0; top: 0; pointer-events: auto; cursor: pointer; user-select: none; transform: translate(-50%, -100%); }
  .label-chip { padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 500; white-space: nowrap; box-shadow: 0 1px 2px rgba(0,0,0,.15); border: 1px solid #cbd5e1; background: rgba(255,255,255,.92); color: #334155; }
  .label-chip.active { background: #f59e0b; border-color: #d97706; color: #0f172a; }
  .reset-btn { position: absolute; bottom: 12px; right: 12px; background: rgba(255,255,255,.92); border: 1px solid #cbd5e1; color: #334155; font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
  .hint { position: absolute; bottom: 12px; left: 12px; background: rgba(255,255,255,.8); color: #64748b; font-size: 10px; padding: 4px 8px; border-radius: 4px; max-width: 60%; }
  aside { width: 330px; border-left: 1px solid #cbd5e1; background: #fff; padding: 14px; overflow-y: auto; }

  .section { margin-bottom: 16px; }

  .btn:hover { background: #f8fafc; }

  .btn-row .btn { flex: 1 1 45%; text-align: center; min-width: 96px; margin-bottom: 0; padding: 5px 6px; font-size: 11px; }
  .legend-cap { font-size: 10px; color: #94a3b8; margin-top: 6px; line-height: 1.5; }

</style>

<body>
<div id="app">
  <header>
    <h1>農機具 3Dビューア — 農機具共済 評価研修用</h1>
    <p>トラクタ・田植機・コンバイン(自脱型/普通型)・乗用管理機。附属装置(作業機)15種の着脱に対応</p>
  </header>
  <main>
    <div id="viewport">
      <div id="canvas-holder"></div>
      <div id="labels"></div>
      <button class="reset-btn" id="reset-view">視点をリセット</button>
      <div class="hint">ドラッグ: 回転 / ホイール・ピンチ: ズーム / 橙色の点: 部位の着眼点</div>
    </div>
    <aside id="panel"></aside>
  </main>
</div>

<script type="module">
import * as THREE from "three";
if (THREE.ColorManagement) THREE.ColorManagement.enabled = false;

/* ============================================================
   マテリアル
============================================================ */
function mat(color, o) { return new THREE.MeshStandardMaterial(Object.assign({ color, roughness: 0.55, metalness: 0.2 }, o)); }
const M = {
  tire:   mat(0x23292e, { roughness: 0.9, metalness: 0 }),
  hub:    mat(0xb2bec3, { roughness: 0.4, metalness: 0.4 }),
  glass:  mat(0x35505f, { roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.75 }),
  steel:  mat(0x8b949c, { metalness: 0.5 }),
  steelD: mat(0x4b5563, { metalness: 0.5 }),
  steelDS: mat(0x8b949c, { metalness: 0.5, side: THREE.DoubleSide }),
  black:  mat(0x1f2937, { roughness: 0.8, metalness: 0 }),
  seat:   mat(0x2d3436, { roughness: 0.85, metalness: 0 }),
  tBody:  mat(0xd35400),
  pBody:  mat(0x2e9e4f),
  cBody:  mat(0xc0392b),
  kBody:  mat(0x2471a3),
  nae:    mat(0x58c76b, { roughness: 0.8, metalness: 0 }),
  white:  mat(0xe8e6df, { roughness: 0.6, metalness: 0 }),
  attRed: mat(0xa93226),
  attRedDS: mat(0xa93226, { side: THREE.DoubleSide }),
  attBlu: mat(0x2471a3),
  attGrn: mat(0x1e8449),
  attYel: mat(0xd4ac0d),
};
const hlMat = mat(0xffb020, { emissive: 0xff7a00, emissiveIntensity: 0.5, side: THREE.DoubleSide });

/* ============================================================
   ヘルパー
============================================================ */
const v = (x, y, z) => new THREE.Vector3(x, y, z);
function tag(mesh, member) { mesh.userData.member = member; mesh.userData.baseMat = mesh.material; return mesh; }
function box(w, h, d, m, x, y, z, member) {
  const o = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), m);
  o.position.set(x, y, z);
  return tag(o, member);
}
function cylZ(r, len, m, x, y, z, member) {
  const o = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 18), m);
  o.rotation.x = Math.PI / 2; o.position.set(x, y, z);
  return tag(o, member);
}
function cylY(r1, r2, len, m, x, y, z, member) {
  const o = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, len, 14), m);
  o.position.set(x, y, z);
  return tag(o, member);
}
function beam(p1, p2, r, m, member) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const o = new THREE.Mesh(new THREE.CylinderGeometry(r, r, dir.length(), 8), m);
  o.position.copy(p1).addScaledVector(dir, 0.5);
  o.quaternion.setFromUnitVectors(v(0, 1, 0), dir.clone().normalize());
  return tag(o, member);
}
function wheel(g, r, w, x, y, z, member) {
  g.add(cylZ(r, w, M.tire, x, y, z, member));
  g.add(cylZ(r * 0.45, w + 0.04, M.hub, x, y, z, member));
}
/* 円筒シェル(カバー・撥土板などの曲面) 軸=Z */
function shell(r, len, thetaStart, arc, m, x, y, z, member) {
  const o = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 14, 1, true, thetaStart, arc), m);
  o.rotation.x = Math.PI / 2; o.position.set(x, y, z);
  return tag(o, member);
}

/* ============================================================
   トラクタ(前方=+X)。3点リンク先端座標:
   下部リンク端 (-2.15, 0.52, ±0.35) / トップリンク端 (-2.10, 0.98, 0)
   PTO軸端 (-1.72, 0.72, 0) / ドローバー先端 (-1.98, 0.42, 0)
============================================================ */
const HITCH = { lowX: -2.15, lowY: 0.52, lowZ: 0.35, topX: -2.10, topY: 0.98 };

function hitchMast(g, AM) {
  // 作業機側マスト: 下部横梁+三角マスト+ヒッチピン(リンク端と同座標で噛み合う)
  g.add(box(0.1, 0.14, 0.86, M.steelD, HITCH.lowX - 0.03, HITCH.lowY, 0, AM));
  g.add(beam(v(HITCH.lowX - 0.03, HITCH.lowY + 0.04, 0.3), v(HITCH.topX - 0.03, HITCH.topY, 0), 0.03, M.steelD, AM));
  g.add(beam(v(HITCH.lowX - 0.03, HITCH.lowY + 0.04, -0.3), v(HITCH.topX - 0.03, HITCH.topY, 0), 0.03, M.steelD, AM));
  [HITCH.lowZ, -HITCH.lowZ].forEach((z) => g.add(cylZ(0.038, 0.14, M.hub, HITCH.lowX, HITCH.lowY, z, AM)));
  g.add(cylZ(0.032, 0.12, M.hub, HITCH.topX, HITCH.topY, 0, AM));
  // 後方フレームレール(マストと装置本体をつなぐ)
  [[0.3], [-0.3]].forEach(([z]) => {
    g.add(beam(v(HITCH.lowX - 0.06, HITCH.lowY, z), v(HITCH.lowX - 0.5, HITCH.lowY + 0.05, z), 0.032, M.steelD, AM));
  });
}
function ptoShaft(g, AM, to) {
  g.add(beam(v(-1.72, 0.72, 0), to, 0.034, M.black, AM));
  g.add(beam(v(-1.72, 0.72, 0), v(-1.72 + (to.x + 1.72) * 0.45, 0.72 + (to.y - 0.72) * 0.45, to.z * 0.45), 0.05, M.steelD, AM)); // シャフトカバー
}

const ATT = {
  rotary:      { label: "ロータリー",        camR: 8 },
  harrow:      { label: "ハロー(代かき)",    camR: 8.5 },
  plow:        { label: "プラウ",            camR: 8 },
  broadcaster: { label: "ブロードキャスター", camR: 8 },
  fertseed:    { label: "施肥播種機",        camR: 8.5 },
  seeder:      { label: "播種機",            camR: 8.5 },
  rotaryseeder:{ label: "ロータリーシーダー", camR: 8 },
  lime:        { label: "ライムソワー",      camR: 8.5 },
  manure:      { label: "マニュアスプレッダー", camR: 10 },
  trencher:    { label: "溝堀機",            camR: 8 },
  azenuri:     { label: "あぜ塗機",          camR: 8 },
  chuko:       { label: "中耕ロータ",        camR: 8.5 },
  stubble:     { label: "スタブルカルチ",    camR: 8.5 },
  subsoiler:   { label: "サブソイラー",      camR: 8 },
  sprayer:     { label: "ブームスプレーヤ",  camR: 10 },
};
const attMemberName = (k) => ATT[k].label + "(附属装置)";

function buildAttachment(g, key) {
  const AM = attMemberName(key);
  if (key !== "manure") hitchMast(g, AM);

  if (key === "rotary") {
    ptoShaft(g, AM, v(-2.42, 0.9, 0));
    g.add(box(0.26, 0.3, 0.24, M.steelD, -2.45, 0.92, 0, AM));                   // センターギヤボックス
    g.add(box(0.12, 0.12, 1.9, M.attRed, -2.45, 0.9, 0, AM));                    // メインビーム
    [[0.3], [-0.3]].forEach(([z]) => g.add(beam(v(-2.62, 0.58, z), v(-2.45, 0.85, z), 0.032, M.attRed, AM))); // 吊りアーム
    g.add(box(0.1, 0.55, 0.16, M.attRed, -2.55, 0.6, 0.95, AM));                 // サイドドライブケース
    g.add(shell(0.42, 1.92, Math.PI / 2, 2.6, M.attRedDS, -2.55, 0.5, 0, AM));   // 主カバー(曲面)
    [[0.96], [-0.96]].forEach(([z]) => g.add(box(0.6, 0.5, 0.03, M.attRed, -2.55, 0.42, z, AM)));
    g.add(cylZ(0.055, 1.85, M.steelD, -2.55, 0.26, 0, AM));                      // 耕うん軸
    for (let z = -0.85; z <= 0.86; z += 0.15) {
      const t1 = box(0.03, 0.24, 0.035, M.steel, -2.55, 0.14, z, AM); t1.rotation.z = (z * 13 % 2) ? 0.55 : -0.55; g.add(t1);
    }
    const ap = box(0.04, 0.42, 1.9, M.attRed, -2.94, 0.28, 0, AM); ap.rotation.z = -0.55; g.add(ap); // 後部整地板
  }

  if (key === "harrow") {
    ptoShaft(g, AM, v(-2.36, 0.72, 0));
    g.add(box(0.24, 0.26, 0.22, M.steelD, -2.4, 0.72, 0, AM));
    g.add(box(0.55, 0.24, 2.9, M.attBlu, -2.5, 0.44, 0, AM));                    // 本体(折りたたみウイング)
    [[1.02], [-1.02]].forEach(([z]) => g.add(box(0.57, 0.05, 0.04, M.steelD, -2.5, 0.58, z, AM))); // ヒンジ
    for (let z = -1.35; z <= 1.36; z += 0.145) {
      g.add(box(0.032, 0.24, 0.032, M.steel, -2.5 + ((z * 9 % 2) ? 0.1 : -0.1), 0.2, z, AM));
    }
    const lv = box(0.05, 0.34, 2.9, M.attBlu, -2.88, 0.24, 0, AM); lv.rotation.z = 0.55; g.add(lv);  // レベラー
    g.add(box(0.03, 0.16, 2.9, M.black, -3.0, 0.1, 0, AM));                      // ゴムフラップ
  }

  if (key === "plow") {
    g.add(beam(v(-2.18, 0.72, 0.3), v(-3.1, 0.72, -0.3), 0.05, M.attBlu, AM));   // 斜めフレーム
    [[-2.55, 0.3], [-3.02, -0.3]].forEach(([x, z]) => {
      g.add(box(0.08, 0.55, 0.06, M.attBlu, x, 0.42, z, AM));                    // シャンク
      const mb = shell(0.3, 0.44, 2.4, 1.5, M.steelDS, x - 0.12, 0.28, z + 0.02, AM); // 撥土板(曲面)
      mb.rotation.y = 0.85; g.add(mb);
      const sh = box(0.3, 0.05, 0.14, M.steelD, x - 0.1, 0.07, z - 0.05, AM);    // シェア(先端)
      sh.rotation.y = 0.35; g.add(sh);
      g.add(box(0.32, 0.12, 0.03, M.steelD, x - 0.14, 0.1, z - 0.13, AM));       // ランドサイド
    });
    g.add(beam(v(-2.34, 0.72, 0.26), v(-2.31, 0.2, 0.62), 0.03, M.steelD, AM));
    g.add(cylZ(0.15, 0.08, M.tire, -2.3, 0.15, 0.66, AM));                        // ゲージ輪
  }

  if (key === "broadcaster") {
    ptoShaft(g, AM, v(-2.42, 0.6, 0));
    g.add(box(0.12, 0.55, 0.12, M.steelD, -2.32, 0.78, 0, AM));
    g.add(cylY(0.52, 0.15, 0.62, M.attGrn, -2.45, 1.18, 0, AM));                  // ホッパー(逆円錐)
    g.add(cylY(0.53, 0.53, 0.05, M.attGrn, -2.45, 1.5, 0, AM));                   // 上縁
    const disc = cylY(0.3, 0.3, 0.035, M.steel, -2.45, 0.66, 0, AM); g.add(disc); // スピンナー
    for (let a = 0; a < 4; a++) {
      const b1 = box(0.26, 0.03, 0.04, M.steel, -2.45 + 0.13 * Math.cos(a * 1.57), 0.7, 0.13 * Math.sin(a * 1.57), AM);
      b1.rotation.y = a * 1.57; g.add(b1);
    }
    g.add(box(0.22, 0.18, 0.2, M.steelD, -2.45, 0.52, 0, AM));                    // ギヤケース
  }

  if (key === "fertseed" || key === "seeder") {
    g.add(box(0.12, 0.1, 2.2, M.steelD, -2.3, 0.6, 0, AM));                       // ツールバー
    if (key === "fertseed") {
      g.add(box(0.36, 0.42, 2.1, M.attGrn, -2.35, 1.02, 0, AM));                  // 肥料ホッパー
      g.add(box(0.3, 0.36, 2.1, M.white, -2.74, 0.96, 0, AM));                    // 種子ホッパー
    } else {
      g.add(box(0.42, 0.44, 2.2, M.white, -2.52, 1.0, 0, AM));                    // 種子ホッパー
    }
    for (let z = -0.85; z <= 0.86; z += 0.34) {
      g.add(beam(v(-2.45, 0.6, z), v(-2.62, 0.1, z), 0.022, M.steelD, AM));       // 作溝シャンク
      g.add(beam(v(-2.5, 0.78, z), v(-2.62, 0.14, z), 0.016, M.black, AM));       // 繰出しチューブ
      g.add(cylZ(0.1, 0.06, M.tire, -2.92, 0.1, z, AM));                          // 鎮圧輪
      g.add(beam(v(-2.7, 0.55, z), v(-2.92, 0.14, z), 0.018, M.steelD, AM));
    }
  }

  if (key === "rotaryseeder") {
    ptoShaft(g, AM, v(-2.42, 0.88, 0));
    g.add(box(0.24, 0.26, 0.22, M.steelD, -2.45, 0.9, 0, AM));
    [[0.3], [-0.3]].forEach(([z]) => g.add(beam(v(-2.62, 0.58, z), v(-2.5, 0.78, z), 0.03, M.attRed, AM)));
    g.add(shell(0.38, 1.72, Math.PI / 2, 2.6, M.attRedDS, -2.55, 0.46, 0, AM));
    [[0.86], [-0.86]].forEach(([z]) => g.add(box(0.55, 0.46, 0.03, M.attRed, -2.55, 0.4, z, AM)));
    g.add(cylZ(0.05, 1.66, M.steelD, -2.55, 0.24, 0, AM));
    for (let z = -0.75; z <= 0.76; z += 0.15) {
      const t1 = box(0.03, 0.22, 0.03, M.steel, -2.55, 0.13, z, AM); t1.rotation.z = (z * 11 % 2) ? 0.5 : -0.5; g.add(t1);
    }
    g.add(box(0.34, 0.36, 1.7, M.white, -2.85, 1.12, 0, AM));                     // 播種ホッパー
    for (let z = -0.6; z <= 0.61; z += 0.4) g.add(beam(v(-2.85, 0.94, z), v(-3.0, 0.3, z), 0.016, M.black, AM));
    const ap = box(0.04, 0.36, 1.72, M.attRed, -2.9, 0.24, 0, AM); ap.rotation.z = -0.55; g.add(ap);
  }

  if (key === "lime") {
    ptoShaft(g, AM, v(-2.35, 0.68, 0));
    g.add(box(0.5, 0.4, 2.9, M.attYel, -2.5, 1.05, 0, AM));                        // 横長ホッパー上部
    const t1 = box(0.42, 0.32, 2.9, M.attYel, -2.5, 0.78, 0, AM); t1.scale.set(0.75, 1, 1); g.add(t1); // 絞り部
    g.add(box(0.53, 0.05, 2.94, M.steelD, -2.5, 1.27, 0, AM));                     // 上縁
    for (let z = -1.25; z <= 1.26; z += 0.25) g.add(box(0.08, 0.14, 0.08, M.steelD, -2.5, 0.56, z, AM)); // 吐出口
    g.add(box(0.2, 0.2, 0.2, M.steelD, -2.4, 0.62, 0, AM));
  }

  if (key === "manure") {
    // けん引式: トラクタのドローバーに連結
    g.add(box(0.14, 0.08, 0.3, M.steelD, -2.02, 0.42, 0, AM));                     // クレビス(連結部)
    g.add(beam(v(-2.02, 0.42, 0), v(-3.1, 0.5, 0), 0.045, M.attRed, AM));          // ドローバー
    g.add(box(1.7, 0.16, 1.25, M.attRed, -3.95, 0.72, 0, AM));                     // 荷台床
    [[0.66], [-0.66]].forEach(([z]) => g.add(box(1.7, 0.55, 0.05, M.attRed, -3.95, 1.05, z, AM)));
    g.add(box(0.05, 0.55, 1.3, M.attRed, -3.12, 1.05, 0, AM));                     // 前壁
    wheel(g, 0.38, 0.22, -4.0, 0.38, 0.8, AM);
    wheel(g, 0.38, 0.22, -4.0, 0.38, -0.8, AM);
    [[0.32], [-0.32]].forEach(([z]) => {
      g.add(cylY(0.09, 0.09, 1.0, M.steelD, -4.85, 1.0, z, AM));                   // 縦ビーター
      for (let y = 0.62; y <= 1.4; y += 0.26) {
        const p = box(0.3, 0.04, 0.05, M.steel, -4.85, y, z, AM); p.rotation.y = y * 7; g.add(p);
      }
    });
    ptoShaft(g, AM, v(-3.08, 0.55, 0));
  }

  if (key === "trencher") {
    ptoShaft(g, AM, v(-2.4, 0.68, 0.15));
    g.add(box(0.24, 0.24, 0.22, M.steelD, -2.42, 0.68, 0.18, AM));
    g.add(beam(v(-2.42, 0.68, 0.18), v(-2.62, 0.55, 0.6), 0.04, M.attYel, AM));    // オフセットアーム
    const disc = cylZ(0.48, 0.1, M.steelD, -2.72, 0.46, 0.6, AM); g.add(disc);     // 掘削ロータ
    for (let a = 0; a < 8; a++) {

  ];
  if (att !== "none") {
    const allAtt = Object.keys(ATT).map(attMemberName);
    members.push({ key:"att", name: attMemberName(att), targets: allAtt, pos:[-2.7, 1.7, 1.1], note: attCaveat });
  }
  return { group: g, members, camR: att !== "none" ? ATT[att]?.camR || 8 : 7.5, targetY: 1.0 };
}

}

/* ============================================================
   機種カタログ・状態
============================================================ */
const MACHINES = {
  tractor:  { label: "トラクタ", sub: "乗用型トラクター", build: () => buildTractor(state.tractorAtt) },
  taue:     { label: "田植機", sub: "乗用型田植機", build: () => buildTaue({ fert: state.taueFert, spray: state.taueSpray }) },
  combine:  { label: "コンバイン(自脱型)", sub: "自脱型コンバイン", build: () => buildCombineJidatsu({ cutter: state.combCutter, auger: state.combAuger }) },
  combine2: { label: "コンバイン(普通型)", sub: "普通型(汎用)コンバイン", build: () => buildCombineFutsu({ auger: state.comb2Auger }) },
  kanriki:  { label: "乗用管理機", sub: "薬剤散布用(ブームスプレーヤ一体型)", build: () => buildKanriki({ boom: state.kanBoom }) },
};

const state = {
  machine: "tractor",
  tractorAtt: "rotary",
  taueFert: true,
  taueSpray: false,
  combCutter: true,
  combAuger: "stored",
  comb2Auger: "stored",
  kanBoom: "extended",
  selectedMember: null,
};

/* ============================================================
   three.js 基盤
============================================================ */
const holder = document.getElementById("canvas-holder");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xdbe7ef);
scene.fog = new THREE.Fog(0xdbe7ef, 25, 55);
const camera = new THREE.PerspectiveCamera(45, holder.clientWidth / holder.clientHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(holder.clientWidth, holder.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
holder.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xffffff, 0x556070, 0.95));
const dirL = new THREE.DirectionalLight(0xfff4e0, 1.05);
dirL.position.set(8, 12, 6);
scene.add(dirL);
const fillL = new THREE.DirectionalLight(0xcfe0ff, 0.3);
fillL.position.set(-6, 5, -8);
scene.add(fillL);
const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({ color: 0x8a9a6b, roughness: 1 }));
ground.rotation.x = -Math.PI / 2;
scene.add(ground);
const grid = new THREE.GridHelper(80, 80, 0x6b7a52, 0x7a8a60);
grid.position.y = 0.001;
scene.add(grid);

const orbit = { theta: Math.PI / 4, phi: Math.PI / 3, radius: 8, target: new THREE.Vector3(0, 1.0, 0) };
let modelGroup = null, currentDef = null, markerMeshes = [];
const raycaster = new THREE.Raycaster();

function selectedTargets() {
  if (!state.selectedMember || !currentDef) return null;
  const m = currentDef.members.find((x) => x.key === state.selectedMember);
  return m ? new Set(m.targets) : null;
}
function applyHighlight() {
  const tg = selectedTargets();
  modelGroup.traverse((m) => {
    if (!m.isMesh || !m.userData.baseMat) return;
    m.material = (tg && tg.has(m.userData.member)) ? hlMat : m.userData.baseMat;
  });
}
function rebuild(resetCam) {
  if (modelGroup) scene.remove(modelGroup);
  markerMeshes.forEach((m) => scene.remove(m));
  markerMeshes = [];
  currentDef = MACHINES[state.machine].build();
  modelGroup = currentDef.group;
  scene.add(modelGroup);
  const geo = new THREE.SphereGeometry(0.09, 16, 16);
  currentDef.members.forEach((mk) => {
    const m = new THREE.Mesh(geo, mat(0xffb020, { emissive: 0xff8c00, emissiveIntensity: 0.6 }));
    m.position.set(mk.pos[0], mk.pos[1], mk.pos[2]);
    m.userData.key = mk.key;
    scene.add(m);
    markerMeshes.push(m);
  });
  if (resetCam) {
    orbit.theta = Math.PI / 4; orbit.phi = Math.PI / 3;
    orbit.radius = currentDef.camR;
    orbit.target.set(0, currentDef.targetY, 0);
  }
  if (state.selectedMember && !currentDef.members.find((m) => m.key === state.selectedMember)) state.selectedMember = null;
  applyHighlight();
  renderLabels();
  renderPanel();
}

/* ============================================================
   ラベル・操作
============================================================ */
const labelsHolder = document.getElementById("labels");
let labelEntries = [];
function renderLabels() {
  labelsHolder.innerHTML = "";
  labelEntries = [];
  currentDef.members.forEach((mk) => {
    const div = document.createElement("div");
    div.className = "label";
    div.innerHTML = `<div class="label-chip${state.selectedMember === mk.key ? " active" : ""}">${mk.name}</div>`;
    div.addEventListener("click", () => { state.selectedMember = mk.key; renderLabels(); renderPanel(); applyHighlight(); });
    labelsHolder.appendChild(div);
    labelEntries.push({ el: div, pos: new THREE.Vector3(mk.pos[0], mk.pos[1], mk.pos[2]) });
  });
}
function updateLabelPositions() {
  const w = holder.clientWidth, h = holder.clientHeight;
  labelEntries.forEach((e) => {
    const p = e.pos.clone().project(camera);
    e.el.style.transform = `translate(-50%,-100%) translate(${(p.x * 0.5 + 0.5) * w}px, ${(-p.y * 0.5 + 0.5) * h}px)`;
    e.el.style.display = p.z > 1 ? "none" : "block";
  });
}
const dom = renderer.domElement;
dom.style.touchAction = "none";
const drag = { on: false, x: 0, y: 0 };
let lastPinch = null;
dom.addEventListener("pointerdown", (e) => { drag.on = true; drag.x = e.clientX; drag.y = e.clientY; });
window.addEventListener("pointermove", (e) => {
  if (!drag.on) return;
  orbit.theta -= (e.clientX - drag.x) * 0.006;
  orbit.phi = Math.max(0.22, Math.min(Math.PI / 2 - 0.02, orbit.phi - (e.clientY - drag.y) * 0.006));
  drag.x = e.clientX; drag.y = e.clientY;
});
window.addEventListener("pointerup", () => { drag.on = false; });
dom.addEventListener("wheel", (e) => {
  e.preventDefault();
  orbit.radius = Math.max(3, Math.min(28, orbit.radius + e.deltaY * 0.01));
}, { passive: false });
dom.addEventListener("touchmove", (e) => {
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastPinch !== null) orbit.radius = Math.max(3, Math.min(28, orbit.radius - (d - lastPinch) * 0.02));
    lastPinch = d; drag.on = false;
  }
}, { passive: true });
dom.addEventListener("touchend", () => { lastPinch = null; });
dom.addEventListener("click", (e) => {
  const rect = dom.getBoundingClientRect();
  const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(markerMeshes);
  if (hits.length > 0) { state.selectedMember = hits[0].object.userData.key; renderLabels(); renderPanel(); applyHighlight(); }
});
window.addEventListener("resize", () => {
  camera.aspect = holder.clientWidth / holder.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(holder.clientWidth, holder.clientHeight);
});
document.getElementById("reset-view").addEventListener("click", () => {
  orbit.theta = Math.PI / 4; orbit.phi = Math.PI / 3;
  orbit.radius = currentDef.camR;
  orbit.target.set(0, currentDef.targetY, 0);
});

/* ============================================================
   パネル
============================================================ */
const panel = document.getElementById("panel");
function el(t, cls, html) {
  const e = document.createElement(t);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}
function renderPanel() {
  panel.innerHTML = "";

  const secM = el("div", "section", "<h2>機種</h2>");
  Object.keys(MACHINES).forEach((k) => {
    const d = MACHINES[k];
    const b = el("button", "btn" + (state.machine === k ? " active" : ""), `${d.label}<small>${d.sub}</small>`);
    b.addEventListener("click", () => { state.machine = k; state.selectedMember = null; rebuild(true); });
    secM.appendChild(b);
  });
  panel.appendChild(secM);

  const secA = el("div", "section", "<h2>附属装置・状態</h2>");
  if (state.machine === "tractor") {
    const row = el("div", "btn-row");
    const items = [["none", "なし"]].concat(Object.keys(ATT).map((k) => [k, ATT[k].label]));
    items.forEach(([k, lb]) => {
      const b = el("button", "btn" + (state.tractorAtt === k ? " active" : ""), lb);
      b.addEventListener("click", () => { state.tractorAtt = k; rebuild(true); });
      row.appendChild(b);
    });
    secA.appendChild(row);
    secA.appendChild(el("div", "legend-cap", "3点リンク(マニュアスプレッダーはドローバー)に装着する作業機を切り替えます。駆動式の作業機にはPTOシャフトが接続されます。"));
  } else if (state.machine === "taue") {
    [["taueFert", "施肥機(側条施肥)"], ["taueSpray", "薬剤散布装置"]].forEach(([k, lb]) => {
      const b = el("button", "btn" + (state[k] ? " active" : ""), (state[k] ? "☑ " : "☐ ") + lb);
      b.addEventListener("click", () => { state[k] = !state[k]; rebuild(false); });
      secA.appendChild(b);
    });
    secA.appendChild(el("div", "legend-cap", "タップで装着/取り外しを切り替えます(複数同時装着可)。"));
  } else if (state.machine === "combine") {
    const bc = el("button", "btn" + (state.combCutter ? " active" : ""), (state.combCutter ? "☑ " : "☐ ") + "排わらカッター");
    bc.addEventListener("click", () => { state.combCutter = !state.combCutter; rebuild(false); });
    secA.appendChild(bc);
    const rowAu = el("div", "btn-row");
    [["stored", "オーガ格納"], ["extended", "オーガ展開"]].forEach(([k, lb]) => {
      const b = el("button", "btn" + (state.combAuger === k ? " active" : ""), lb);
      b.addEventListener("click", () => { state.combAuger = k; rebuild(false); });
      rowAu.appendChild(b);
    });
    secA.appendChild(rowAu);
  } else if (state.machine === "combine2") {
    const rowAu = el("div", "btn-row");
    [["stored", "オーガ格納"], ["extended", "オーガ展開"]].forEach(([k, lb]) => {
      const b = el("button", "btn" + (state.comb2Auger === k ? " active" : ""), lb);
      b.addEventListener("click", () => { state.comb2Auger = k; rebuild(false); });
      rowAu.appendChild(b);
    });
    secA.appendChild(rowAu);
    secA.appendChild(el("div", "legend-cap", "普通型(汎用)コンバインは麦・大豆・そば等にも対応するリール式ヘッダーを備えます。"));
  } else {
    const rowB = el("div", "btn-row");
    [["extended", "ブーム展開"], ["folded", "ブーム格納"]].forEach(([k, lb]) => {
      const b = el("button", "btn" + (state.kanBoom === k ? " active" : ""), lb);
      b.addEventListener("click", () => { state.kanBoom = k; rebuild(false); });
      rowB.appendChild(b);
    });
    secA.appendChild(rowB);
    secA.appendChild(el("div", "legend-cap", "一体型のため散布装置(ブーム・タンク)は機体の一部です。"));
  }
  panel.appendChild(secA);

  const secP = el("div", "section", "<h2>部位と評価の着眼点</h2><div class=\"legend-cap\" style=\"margin:0 0 6px\">選択した部位はモデル上でオレンジ色に点滅表示されます</div>");
  currentDef.members.forEach((mk) => {
    const b = el("button", "btn" + (state.selectedMember === mk.key ? " active" : ""), mk.name);
    b.addEventListener("click", () => { state.selectedMember = mk.key; renderLabels(); renderPanel(); applyHighlight(); });
    secP.appendChild(b);
  });
  const active = currentDef.members.find((m) => m.key === state.selectedMember);
  if (active) secP.appendChild(el("div", "note-box", `<div class="title">${active.name}</div>${active.note}`));
  panel.appendChild(secP);

  panel.appendChild(el("div", "section note-box",
    `<div class="title">農機具共済の基本(公開情報に基づく一般的な枠組み)</div>トラクター・田植機・コンバイン等の農機具を対象に、火災等・自然災害(地震を除く)・衝突・接触・墜落・転覆などの事故(格納中・稼働中を問わず)による損害を補償します。共済金は新調達価額を基準に修理費を補填する新価ベースが一般的で、事故から1年以内に復旧しない場合は時価ベース等の扱いになります。中古取得の農機具は付保割合条件付実損てん補特約を付帯して加入します。<b>附属装置(ロータリー・ハロー・結束機等)の加入区分は組合により異なる</b>ため、装着状態と加入内容の確認が評価実務で重要です。摩滅・腐食・サビ等の自然消耗による損害は対象外とされます。加入限度額・免責・特約の細部は各組合の約款によります。`));

  panel.appendChild(el("div", "disclaimer",
    "本モデルは研修用の簡略化イメージです。機体・作業機の形状/寸法/構造は実機と一致せず、共済の解説は各NOSAIの公開情報に基づく一般的な枠組みであり、正式な約款・損害評価基準を再現したものではありません。実際の引受・損害評価は各農業共済組合等の約款・基準に基づいて行ってください。"));
}

/* ============================================================
   ループ
============================================================ */
function animate() {
  camera.position.set(
    orbit.target.x + orbit.radius * Math.sin(orbit.phi) * Math.sin(orbit.theta),
    orbit.target.y + orbit.radius * Math.cos(orbit.phi),
    orbit.target.z + orbit.radius * Math.sin(orbit.phi) * Math.cos(orbit.theta)
  );
  camera.lookAt(orbit.target);
  hlMat.emissiveIntensity = 0.35 + 0.3 * Math.sin(performance.now() * 0.004);
  renderer.render(scene, camera);
  updateLabelPositions();
  requestAnimationFrame(animate);
}
rebuild(true);
animate();
</script>
</body>
</html>
